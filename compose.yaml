services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: postgre_db
      POSTGRES_USER: postgre_user
      POSTGRES_PASSWORD: postgre_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  webapi:
    image: bendylot/bimmanagerportal-api:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5002:8080"
    depends_on:
      - postgres

  webassembly:
    image: bendylot/bimmanagerportal-web:latest
    ports:
      - "5502:80"

volumes:
  postgres_data: