services:

  postgres:
    image: postgres:16-alpine
    container_name: bimmanagerportal_postgres
    restart: always
    environment:
      POSTGRES_DB: postgre_db
      POSTGRES_USER: postgre_user
      POSTGRES_PASSWORD: postgre_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  webapi:
    image: bendylot/bimmanagerportal-api:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      - postgres

  webassembly:
    image: bendylot/bimmanagerportal-web:latest

volumes:
  postgres_data: