name: Build and Deploy

on:
  push:
    branches: ["master"]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push WebAPI
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Presentation/BimManagerPortal.WebApi/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USER }}/bimmanagerportal-api:latest

    - name: Build and push WebAssembly
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Presentation/BimManagerPortal.WebAssembly/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USER }}/bimmanagerportal-web:latest

  deploy:

    needs: build
    runs-on: ubuntu-latest

    steps:

    - name: Deploy to server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        command_timeout: 20m
        script: |
          set -e

          mkdir -p ~/BimManagerPortal
          cd ~/BimManagerPortal

          if [ -d ".git" ]; then
            git pull
          else
            git clone https://${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

          docker compose pull
          docker compose up -d --remove-orphans

          docker image prune -f
